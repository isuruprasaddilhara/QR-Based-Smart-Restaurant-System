version: "3.9"

services:
  backend:
    build: ./Backend/scan2serve
    env_file:
      - ./Backend/scan2serve/.env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    volumes:
      - static_volume:/static
      - media_volume:/app/media
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/www/certbot
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_var:/var/www/certbot

volumes:
  static_volume:
  media_volume:
  certbot_etc:
  certbot_var: